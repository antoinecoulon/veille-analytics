name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

  # Analyse de sécurité (C18). Deux couches complémentaires qui ne cherchent pas la même
  # chose : `pnpm audit` interroge la base d'avis publics sur les dépendances INSTALLÉES,
  # gitleaks cherche des secrets dans le code et son HISTORIQUE. Ni l'une ni l'autre ne
  # juge la logique applicative — c'est une limite à assumer, pas à masquer.
  #
  # Job séparé de `quality` : les deux tournent en parallèle, et un pipeline rouge dit
  # immédiatement s'il s'agit d'un défaut fonctionnel ou d'un défaut de sécurité.
  # Il ne bloque PAS le déploiement (`deploy` ne dépend que de `quality`) : un avis
  # publié sur une dépendance de développement ne doit pas empêcher de livrer un
  # correctif en production. Il rend le pipeline rouge, ce qui suffit à forcer le
  # traitement — cf. ADR D14.
  security:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — gitleaks analyse tout l'historique, pas seulement le dernier
      # commit. Un secret retiré dans un commit ultérieur reste exposé dans les objets git.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Seuil `high` : au 2026-07-21, la totalité des avis remontés venait de dépendances
      # transitives de wrangler (undici, ws, esbuild), outillage de développement jamais
      # embarqué dans le bundle du Worker. Un seuil `low` rendrait le pipeline rouge en
      # permanence pour des avis sans effet en production, et un pipeline qu'on apprend à
      # ignorer ne protège plus rien.
      - run: pnpm audit --audit-level=high

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Analyse de qualité de code (C19). SonarCloud : bugs, code smells, duplication et
  # quality gate persistante — la dimension que ESLint + tsc (job `quality`) ne couvrent
  # pas. Job séparé et NON bloquant pour le déploiement (`deploy` ne dépend que de
  # `quality`), même principe que le job `security` : un manquement de qualité rend le
  # pipeline rouge sans empêcher de livrer un correctif. Choix tracé en ADR D17.
  #
  # Prérequis de câblage : compte SonarCloud lié au dépôt + secret `SONAR_TOKEN` posé dans
  # les secrets GitHub Actions. Tant que le secret est absent, ce job échoue — c'est voulu :
  # il n'a de sens qu'une fois SonarCloud connecté.
  sonar:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — SonarCloud date le « new code » à partir de l'historique complet ;
      # un checkout superficiel fausse la quality gate sur le code récent.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Action officielle SonarQube/SonarCloud (config dans sonar-project.properties).
      # Épinglée au SHA complet plutôt qu'au tag mobile `v5` : un tag peut être redéplacé
      # vers un autre commit, un SHA est immuable — durcissement de la chaîne d'appro CI.
      - uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  deploy:
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
