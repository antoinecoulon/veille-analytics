# Configuration SonarCloud (compétence C19 — analyse de qualité de code).
# Analyse déclenchée par le job `sonar` de .github/workflows/ci.yml. Choix tracé en ADR D17.
#
# organization / projectKey doivent correspondre à ce que SonarCloud a créé en liant le dépôt
# (convention SonarCloud : <organization>_<repo>). Valeurs par défaut d'après le compte GitHub
# antoinecoulon — à ajuster si SonarCloud en a généré d'autres.
sonar.organization=antoinecoulon
sonar.projectKey=antoinecoulon_veille-analytics
sonar.projectName=veille-analytics

# Code applicatif analysé : le Worker et sa bibliothèque de fonctions pures.
sonar.sources=src
sonar.tests=test

# Hors périmètre applicatif : outillage (.mjs, shell), batch Spark, données, IaC, migrations SQL.
# Ce sont des scripts d'exploitation, pas le code servi en production.
sonar.exclusions=scripts/**,spark/**,data/**,migrations/**,terraform/**,annotation/**

# Couverture de tests : NON alimentée pour l'instant. La suite tourne sur
# @cloudflare/vitest-pool-workers (Miniflare/workerd), où la couverture v8 est instable —
# préférer une absence de couverture assumée à un chiffre faux. À activer si un lcov fiable
# est produit un jour (cf. ADR D17, limite documentée).
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
